{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCalm - {% block title %}{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'tienda/css/style.css' %}" />
    <script src="{% static 'tienda/js/app.js' %}"></script>
  </head>
  <body>
    <!-- Header / Navbar -->
    <header>
      <nav
        class="navbar navbar-expand-lg navbar-light bg-light fixed-top shadow-sm"
      >
        <div class="container-fluid">
          <a
            class="navbar-brand d-flex align-items-center"
            href="{% url 'home' %}"
          >
            <img
              src="{% static 'tienda/img/logo.png' %}"
              alt="Logo Total Calm"
              class="me-2 rounded-circle img-fluid"
              style="max-width: 60px"
            />
            <span class="fw-bold">TotalCalm</span>
          </a>
          <!-- Botón hamburguesa -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Menú -->
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a
                  class="nav-link {% block nav_home %}{% endblock %}"
                  href="{% url 'home' %}"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% block nav_carrito %}{% endblock %}"
                  href="{% url 'carrito' %}"
                >
                  Carrito <span id="contador" class="badge bg-primary">0</span>
                </a>
              </li>
              <li class="nav-item">
                <a
                  class="nav-link {% block nav_contacto %}{% endblock %}"
                  href="{% url 'contacto' %}"
                  >Contacto</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- Contenido dinámico -->
    <main class="container my-4 mt-5 pt-5">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-light text-center p-3 mt-4 border-top">
      <small
        >© 2026 Total Calm - Tienda de ropa deportiva para yoga y pilates</small
      >
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
