{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCalm - Contacto</title>
    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'tienda/css/style.css' %}" />
    <script src="{% static 'tienda/js/app.js' %}"></script>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
          <a
            class="navbar-brand d-flex align-items-center"
            href="{% url 'home' %}"
          >
            <img
              src="{% static 'tienda/img/logo.png' %}"
              alt="Logo Total Calm"
              class="me-2 rounded-circle img-fluid"
              style="max-width: 70px"
            />
            <span>TotalCalm</span>
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'carrito' %}">
                  Carrito <span id="contador" class="badge bg-primary">0</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="{% url 'contacto' %}"
                  >Contacto</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-4 mt-5 pt-5">
      <h2>Contacto</h2>
      <form class="mt-3">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" class="form-control" id="nombre" required />
        </div>
        <div class="mb-3">
          <label for="correo" class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" id="correo" required />
        </div>
        <div class="mb-3">
          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea
            class="form-control"
            id="mensaje"
            rows="4"
            required
          ></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
      </form>
    </main>

    <footer class="bg-light text-center p-3 mt-4">
      <small>© 2026 Total Calm</small>
    </footer>
  </body>
</html>
