{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TotalCalm - Detalle</title>
    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Estilos propios -->
    <link rel="stylesheet" href="{% static 'tienda/css/style.css' %}" />
    <script src="{% static 'tienda/js/app.js' %}"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
          <a
            class="navbar-brand d-flex align-items-center"
            href="{% url 'home' %}"
          >
            <img
              src="{% static 'tienda/img/logo.png' %}"
              alt="Logo Total Calm"
              class="me-2 rounded-circle img-fluid"
              style="max-width: 70px"
            />
            <span>TotalCalm</span>
          </a>
          <!-- Botón hamburguesa -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Menú colapsable -->
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'carrito' %}">
                  Carrito <span id="contador" class="badge bg-primary">0</span>
                </a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'contacto' %}">Contacto</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="container my-4 my-5 pt-5" style="margin-top: 120px">
      <section class="row">
        <article class="col-md-6">
          <img
            src="{% static 'tienda/img/leggings.jpg' %}"
            class="img-fluid"
            alt="Leggings Yoga"
          />
        </article>
        <article class="col-md-6">
          <!-- Consistencia en estilos -->
          <h2 class="card-title">Leggings Yoga</h2>
          <p class="card-text">
            Leggings cómodos y flexibles, ideales para pilates y yoga.
          </p>
          <p class="card-text"><strong>$19.990</strong></p>
          <button class="btn btn-primary" id="agregarCarrito">
            Agregar al carrito
          </button>
        </article>
      </section>
    </main>

    <footer class="bg-light text-center p-3 mt-4">
      <small>© 2026 Total Calm</small>
    </footer>
  </body>
</html>
