{% extends 'tienda/base.html' %}

{% block title %}Detalle{% endblock %}
{% block nav_catalogo %}active{% endblock %}

{% block content %}
<main class="container my-5 pt-5" style="margin-top: 120px">
  <section class="row">
    <article class="col-md-6">
      <img
        src="{{ producto.imagen.url }}"
        class="img-fluid rounded shadow-sm"
        alt="{{ producto.nombre }}"
      />
    </article>
    <article class="col-md-6">
      <h2 class="card-title">{{ producto.nombre }}</h2>
      <p class="card-text">{{ producto.descripcion }}</p>
      <p class="card-text">
        <strong>${{ producto.precio }}</strong>
      </p>

      <!-- Botón para agregar al carrito -->
      <form method="post" action="{% url 'agregar_carrito' producto.id %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="cantidad" class="form-label">Cantidad</label>
          <input
            type="number"
            name="cantidad"
            id="cantidad"
            value="1"
            min="1"
            class="form-control"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary">
          Agregar al carrito
        </button>
      </form>

      <!-- Enlace para volver al catálogo -->
      <a href="{% url 'catalogo' %}" class="btn btn-link mt-3">← Volver al catálogo</a>
    </article>
  </section>
</main>
{% endblock %}
